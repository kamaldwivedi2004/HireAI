<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireAI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a10;--bg2:#0c1118;--bg3:#111820;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#edf0f7;--text2:#7a8699;--text3:#3a4558;--blue:#4f8ef7;--blue2:#7cb3ff;--green:#00d68f;--red:#ff6b6b;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 700px 500px at 30% 20%,rgba(79,142,247,0.08),transparent 60%),radial-gradient(ellipse 600px 400px at 70% 80%,rgba(167,139,250,0.06),transparent 60%);pointer-events:none;}
nav{border-bottom:1px solid var(--border);background:rgba(6,10,16,0.9);backdrop-filter:blur(16px);padding:0 24px;height:58px;display:flex;align-items:center;}
.logo{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--text);text-decoration:none;}
.logo span{color:var(--blue2);}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px;position:relative;z-index:1;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:420px;}
.card-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.card-sub{font-size:13px;color:var(--text2);margin-bottom:28px;}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:5px;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;padding:11px 14px;outline:none;transition:border-color .15s;margin-bottom:14px;}
input:focus{border-color:rgba(79,142,247,0.45);}
input::placeholder{color:var(--text3);}
.btn{width:100%;background:var(--blue);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-top:4px;}
.btn:hover{background:var(--blue2);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.alert{padding:11px 14px;border-radius:9px;font-size:13px;margin-bottom:14px;display:none;line-height:1.5;}
.ae{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.22);color:var(--red);}
.as{background:rgba(0,214,143,.08);border:1px solid rgba(0,214,143,.22);color:var(--green);}
.divider{text-align:center;margin:20px 0;color:var(--text3);font-size:12px;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.link-row{text-align:center;font-size:13px;color:var(--text2);margin-top:16px;}
.link-row a{color:var(--blue2);text-decoration:none;font-weight:500;}
.spin{display:none;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;margin:0 auto;}
@keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<nav><a href="/" class="logo">Hire<span>AI</span></a></nav>
<div class="main">
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your HireAI account</div>
    <div class="alert ae" id="err"></div>
    <div class="alert as" id="suc"></div>
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com">
    <label>Password</label>
    <input type="password" id="pw" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="btn" onclick="doLogin()">Sign In</button>
    <div class="link-row">Don't have an account? <a href="/signup">Sign up free</a></div>
    <div class="divider">or</div>
    <div class="link-row"><a href="/screener">Try Free Resume Screener →</a></div>
  </div>
</div>
<script>
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pw=document.getElementById('pw').value;
  const btn=document.getElementById('btn');
  const err=document.getElementById('err');
  const suc=document.getElementById('suc');
  err.style.display='none'; suc.style.display='none';
  if(!email||!pw){err.textContent='Please fill all fields';err.style.display='block';return;}
  btn.disabled=true; btn.textContent='Signing in…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw}),credentials:'include'});
    const d=await r.json();
    if(r.ok){
      suc.textContent='Logged in! Redirecting…'; suc.style.display='block';
      setTimeout(()=>window.location.href=d.role==='recruiter'?'/recruiter':'/jobseeker',800);
    } else {
      err.textContent=d.error||'Login failed'; err.style.display='block';
    }
  }catch(e){err.textContent='Network error';err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Sign In';}
}
// Check if already logged in
fetch('/api/auth/me',{credentials:'include'}).then(r=>r.json()).then(d=>{
  if(d.logged_in) window.location.href=d.role==='recruiter'?'/recruiter':'/jobseeker';
});
</script>
</body>
</html>
